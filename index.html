<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gentle Unfolding for Dhanu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #0a0a0a, #1a0a2a, #2a0a3a);
            margin: 0;
            color: #f3e8ff;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .bg-gradient-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 10%, #4a00e0 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, #a200ff 0%, transparent 40%),
                        radial-gradient(circle at 20% 60%, #ff00ea 0%, transparent 40%);
            background-size: 200% 200%;
            animation: moveGradient 20s ease-in-out infinite alternate;
        }
        @keyframes moveGradient {
            0% { background-position: 0% 50%, 50% 100%, 100% 0%; }
            100% { background-position: 100% 50%, 0% 0%, 50% 100%; }
        }
        .content-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            padding: 2rem;
        }
        .content-section.visible {
            opacity: 1;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            text-shadow: 0 0 10px #f3e8ff;
            margin-bottom: 2rem;
            position: relative;
        }
        .title::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -1rem;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background-color: #f3e8ff;
            animation: pulse-line 2s infinite;
        }
        @keyframes pulse-line {
            0%, 100% { transform: translateX(-50%) scaleX(1); }
            50% { transform: translateX(-50%) scaleX(1.5); }
        }
        .poem-line {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 1rem 0;
            opacity: 0.1;
            transition: opacity 1s ease-in-out;
        }
        .poem-line.visible {
            opacity: 1;
        }
        .final-section {
            height: 150vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 20vh;
        }
        .dhanu-image {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 2px solid transparent;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transition: transform 0.5s ease-out, box-shadow 0.5s ease-out;
        }
        .final-message {
            margin-top: 2rem;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            text-shadow: 0 0 15px #f3e8ff;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            max-width: 600px;
            padding: 1rem;
            border: 1px solid transparent;
            border-radius: 1rem;
        }
        @media (min-width: 768px) {
            .title { font-size: 3rem; }
            .poem-line { font-size: 2rem; }
            .final-message { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient-animation"></div>

    <div class="content-section" id="section1">
        <h1 class="title">My Dearest Dhanu,</h1>
    </div>

    <div class="content-section" id="section2">
        <p class="poem-line">In this world of endless skies,</p>
        <p class="poem-line">My compass is in your eyes.</p>
    </div>

    <div class="content-section" id="section3">
        <p class="poem-line">A whispered star, a gentle glow,</p>
        <p class="poem-line">A story only our hearts know.</p>
    </div>

    <div class="content-section" id="section4">
        <p class="poem-line">Each moment, a constellation so grand,</p>
        <p class="poem-line">Held in the comfort of your hand.</p>
    </div>

    <div class="final-section">
        <img id="dhanuImage" src="dhanu.png" alt="My love, Dhanu" class="dhanu-image" onerror="this.onerror=null;this.src='https://placehold.co/300x300/1a0a2a/f3e8ff?text=Dhanu';" />
        <p class="final-message text-center" id="finalMessage">
            You are the universe I never knew I was searching for.
        </p>
    </div>

    <script>
        const sections = document.querySelectorAll('.content-section');
        const finalSection = document.querySelector('.final-section');
        const dhanuImage = document.getElementById('dhanuImage');
        const finalMessage = document.getElementById('finalMessage');

        // Initial image size and shadow
        const baseSize = 250;
        const baseShadow = 0;

        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.5 
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    const poemLines = entry.target.querySelectorAll('.poem-line');
                    if (poemLines.length > 0) {
                        poemLines.forEach((line, index) => {
                            setTimeout(() => {
                                line.classList.add('visible');
                            }, index * 500); 
                        });
                    }
                } else {
                    entry.target.classList.remove('visible');
                }
            });
        }, observerOptions);

        sections.forEach(section => observer.observe(section));

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const finalSectionTop = finalSection.offsetTop;
            const windowHeight = window.innerHeight;

            if (scrollY > finalSectionTop - windowHeight) {
                const scrollProgress = (scrollY - (finalSectionTop - windowHeight)) / (finalSection.clientHeight - windowHeight);
                
                const newSize = baseSize + (200 * scrollProgress); 
                dhanuImage.style.transform = `scale(${1 + scrollProgress * 0.5})`;
                dhanuImage.style.boxShadow = `0 0 ${baseShadow + scrollProgress * 50}px rgba(255, 255, 255, ${0.5 + scrollProgress * 0.5})`;

                if (scrollProgress > 0.8) {
                    finalMessage.classList.add('visible');
                } else {
                    finalMessage.classList.remove('visible');
                }
            }
        });
    </script>
</body>
</html>
